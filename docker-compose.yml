services:
  postgres:
    image: postgres:16-alpine
    container_name: sherry-postgres
    environment:
      POSTGRES_DB: sherry
      POSTGRES_USER: sherry
      POSTGRES_PASSWORD: sherry_dev_password
      TZ: Asia/Shanghai
    ports:
      - "5432:5432"
    volumes:
      - sherry_postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sherry -d sherry"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  sherry_postgres_data:
